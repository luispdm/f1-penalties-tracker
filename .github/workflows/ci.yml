name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Supersede in-flight runs on the same ref. PRs only: cancelling a push run would
# leave the superseded commit on main with a cancelled check instead of a green one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Job id is the status check context that branch protection requires. Renaming
  # it silently detaches the gate, so leave it alone.
  ci:
    runs-on: ubuntu-latest
    # Runs take ~2 min on an empty workspace. Timeout to be reviewed when pdf extraction
    # and database service land
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # No version here: rustup reads rust-toolchain.toml. One pin, one place.
      - name: Install toolchain
        run: |
          rustup toolchain install --no-self-update
          rustup show active-toolchain

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked
